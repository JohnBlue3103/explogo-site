<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Réinitialisation du mot de passe – Explogo</title>
  <link rel="stylesheet" href="css/reset-password.css">
</head>
<body>
  <div class="card">
    <div class="card-inner">
      <div class="logo">
        <img src="assets/img/logo.png" alt="Explogo" onerror="this.style.display='none'">
      </div>

      <h1>Nouveau mot de passe</h1>
      <p class="subtitle">Choisissez un nouveau mot de passe pour votre compte</p>

      <form id="form">
        <label for="pwd">Nouveau mot de passe</label>
        <input type="password" id="pwd" placeholder="••••••••" autocomplete="new-password">

        <label for="pwd2">Confirmer le mot de passe</label>
        <input type="password" id="pwd2" placeholder="••••••••" autocomplete="new-password">

        <p class="hint">Au moins 8 caractères</p>

        <button type="submit" id="btn">Valider</button>
      </form>

      <div class="msg" id="msg"></div>
    </div>
  </div>

  <script src="js/reset-password.js" defer></script>
</body>
</html>
