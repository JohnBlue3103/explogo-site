<!doctype html>
<html lang="fr">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact — ExploGo</title>

  <link rel="stylesheet" href="css/index.css">
  <link rel="stylesheet" href="css/contact.css">

  <script src="js/contact.js" defer></script>
</head>

<body>

<header>
  <nav class="nav">
    <a class="brand" href="index.html">
      <img src="assets/img/logo.png" class="brand-logo">
      <span class="brand-name">ExploGo</span>
    </a>
  </nav>
</header>

<main>

<section class="section">
  <div class="container contact-wrapper">

    <div class="section-head">
      <h2>Contact</h2>
      <p class="sublead">Une question ou un problème ? Écrivez-nous.</p>
    </div>

    <div class="contact-card">

      <form id="contactForm" class="contact-form">

        <label for="sujet">Sujet</label>
        <input id="sujet" type="text" placeholder="Ex : problème technique">

        <label for="message">Message</label>
        <textarea id="message" placeholder="Décrivez votre problème..."></textarea>

        <button class="btn btn-primary contact-submit" type="submit">
          Envoyer
        </button>

        <p id="statusMessage" class="contact-status"></p>

      </form>

    </div>

  </div>
</section>

</main>

<footer class="site-footer">
  <div class="container">
    <ul class="footer-links">
      <li><a href="conditions-utilisation.html">Conditions d'utilisation</a></li>
      <li><a href="confidentialite.html">Politique de confidentialité</a></li>
      <li><a href="mentions-legales.html">Mentions légales</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </div>
</footer>

</body>
</html>
